name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # --- Job 1: C++ Engine Build (The "Base" Repo) ---
  build-cpp-engine:
    name: Build Engine (${{ matrix.arch }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: avx2
            cmake_flag: USE_AVX2
          - os: ubuntu-latest
            arch: avx512
            cmake_flag: USE_AVX512

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C++ dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake \
            libssl-dev libcurl4-openssl-dev

      - name: Configure CMake
        run: |
          mkdir -p build && cd build
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -D${{ matrix.cmake_flag }}=ON \
            ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run Engine Sanity
        run: |
          ./build/ndd

  # --- Job 2: Python AI Backend Tests (The "Application" Layer) ---
  test-python-backend:
    name: Backend Tests (Python 3.10)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx anyio

      - name: Run Backend Tests
        run: |
          pytest tests/ -v
