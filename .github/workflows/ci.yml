name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build (${{ matrix.arch }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: avx2
            cmake_flag: USE_AVX2
          - os: ubuntu-latest
            arch: avx512
            cmake_flag: USE_AVX512

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake clang-19 \
            libssl-dev libcurl4-openssl-dev

      - name: Configure CMake
        run: |
          mkdir -p build && cd build
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -D${{ matrix.cmake_flag }}=ON \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure -j$(nproc)
